<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>XJJ</title>
<style>
/* =====================================================================
   XJJ – Single File Video Player
   Source 1 → get/videos.txt  (one video URL per line)
   Source 2 → get/videos.json (array of objects: [{url:"…",title:"…"},...])
   ===================================================================== */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0d0d0d;
  --surface:     #1a1a1a;
  --border:      #2e2e2e;
  --accent:      #fe2c55;
  --accent2:     #25f4ee;
  --text:        #ffffff;
  --text-muted:  #888888;
  --btn-bg:      rgba(255,255,255,0.12);
  --btn-hover:   rgba(255,255,255,0.22);
  --radius:      10px;
  --sidebar-w:   220px;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* ── TOP NAV (Mobile only) ─────────────────────────────────── */
#topbar {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 52px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.75), transparent);
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
}
#topbar .logo-text {
  font-size: 1.4rem;
  font-weight: 800;
  letter-spacing: 2px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
/* ── SOURCE DROPDOWN (shared) ───────────────────────────────────── */
.source-dropdown-wrap {
  position: relative;
}
.source-dropdown-wrap .dd-selected {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  background: var(--btn-bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: var(--radius);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  user-select: none;
  white-space: nowrap;
}
.source-dropdown-wrap .dd-selected:hover {
  background: var(--btn-hover);
}
.source-dropdown-wrap .dd-selected.open {
  border-color: var(--accent);
  background: rgba(254,44,85,0.12);
}
.source-dropdown-wrap .dd-arrow {
  font-size: 0.65rem;
  transition: transform 0.2s;
  opacity: 0.7;
}
.source-dropdown-wrap .dd-selected.open .dd-arrow {
  transform: rotate(180deg);
}
.source-dropdown-wrap .dd-menu {
  display: none;
  position: absolute;
  left: 0;
  background: #1e1e26;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  z-index: 500;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  min-width: 100%;
  white-space: nowrap;
}
.source-dropdown-wrap .dd-menu.open { display: block; }
/* Sidebar dropdown opens downward */
#sidebar .dd-menu { top: calc(100% + 4px); }
/* Mobile topbar dropdown opens downward */
#topbar .dd-menu  { top: calc(100% + 4px); }
.source-dropdown-wrap .dd-menu button {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  color: var(--text);
  padding: 10px 14px;
  font-size: 0.82rem;
  cursor: pointer;
  text-align: left;
  transition: background 0.12s;
}
.source-dropdown-wrap .dd-menu button:last-child { border-bottom: none; }
.source-dropdown-wrap .dd-menu button:hover { background: var(--btn-bg); }
.source-dropdown-wrap .dd-menu button.active {
  background: rgba(254,44,85,0.15);
  color: var(--accent);
  font-weight: 700;
}
.source-dropdown-wrap .dd-menu .dd-badge {
  font-size: 0.6rem;
  padding: 1px 6px;
  border-radius: 10px;
  font-weight: 700;
  margin-left: auto;
}
.dd-badge.badge-list { background: rgba(37,244,238,0.15); color: var(--accent2); }
.dd-badge.badge-api  { background: rgba(254,44,85,0.15);  color: var(--accent);  }

/* ── APP SHELL ─────────────────────────────────────────────── */
#app {
  display: flex;
  width: 100%; height: 100%;
}

/* ── PC SIDEBAR ────────────────────────────────────────────── */
#sidebar {
  display: flex;
  flex-direction: column;
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px 16px 20px;
  gap: 4px;
  z-index: 10;
}
.sidebar-logo {
  font-size: 1.7rem;
  font-weight: 900;
  letter-spacing: 3px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 22px;
  text-align: center;
}
.sidebar-section-label {
  font-size: 0.63rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  margin: 12px 0 4px 4px;
}
.sidebar-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  background: transparent;
  border: 1px solid transparent;
  color: var(--text);
  padding: 10px 12px;
  border-radius: var(--radius);
  font-size: 0.83rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  text-align: left;
  width: 100%;
}
.sidebar-btn:hover { background: var(--btn-bg); }
.sidebar-btn.active {
  background: rgba(254,44,85,0.15);
  border-color: var(--accent);
  color: var(--accent);
}
.btn-icon { font-size: 1rem; }

.sidebar-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 8px 0;
}

/* Toggle controls */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 4px;
}
.toggle-row span { font-size: 0.82rem; }
.toggle { position: relative; width: 40px; height: 22px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; inset: 0;
  background: var(--border);
  border-radius: 20px;
  cursor: pointer;
  transition: background 0.25s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  left: 3px; top: 3px;
  width: 16px; height: 16px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.25s;
}
.toggle input:checked + .toggle-slider { background: var(--accent); }
.toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

/* Nav buttons */
.nav-btn-group {
  display: flex; flex-direction: column; gap: 6px;
  margin-top: auto;
}
.nav-arrow-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  background: var(--btn-bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px;
  border-radius: var(--radius);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  width: 100%;
}
.nav-arrow-btn:hover { background: var(--btn-hover); }
.pass-btn {
  background: linear-gradient(135deg, var(--accent), #c41e3e) !important;
  border-color: transparent !important;
  font-size: 0.9rem;
  padding: 12px !important;
}

/* ── VIDEO AREA ─────────────────────────────────────────────── */
#video-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #000;
}

#video-container {
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

#main-video {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: 100%;
  object-fit: contain;
  display: block;
  cursor: pointer;
  background: #000;
}

/* Loading / error overlay */
#overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.75);
  z-index: 5;
  gap: 14px;
}
#overlay.hidden { display: none; }
.spinner {
  width: 44px; height: 44px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#overlay-msg { font-size: 0.9rem; color: var(--text-muted); }

/* Play/pause icon flash */
#play-flash {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  font-size: 3.5rem;
  opacity: 0;
  pointer-events: none;
  z-index: 10;
  text-shadow: 0 0 20px rgba(0,0,0,0.6);
}
#play-flash.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  animation: flashOut 0.5s ease forwards 0.15s;
}
@keyframes flashOut { to { opacity: 0; transform: translate(-50%,-50%) scale(1.3); } }

/* Swipe hint */
#swipe-hint {
  position: absolute;
  bottom: 72px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(4px);
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.7);
  pointer-events: none;
  z-index: 20;
  transition: opacity 1s;
}
#swipe-hint.hidden { opacity: 0; }

/* Mobile bottom controls */
#mobile-controls {
  display: none;
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 50;
  background: linear-gradient(transparent, rgba(0,0,0,0.82));
  padding: 40px 16px 18px;
  flex-direction: column;
  gap: 10px;
}
.mobile-btn-row {
  display: flex;
  gap: 10px;
  justify-content: center;
}
.mobile-btn {
  background: var(--btn-bg);
  border: 1px solid rgba(255,255,255,0.2);
  color: var(--text);
  padding: 9px 18px;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  backdrop-filter: blur(6px);
}
.mobile-btn:hover { background: var(--btn-hover); }
.mobile-btn.btn-active { background: var(--accent); border-color: var(--accent); }
.mobile-btn.pass { background: var(--accent); border-color: var(--accent); }

/* ── RIGHT INFO PANEL (PC) ──────────────────────────────────── */

/* source dropdowns handled by .source-dropdown-wrap above */

/* Video counter */
#video-counter {
  position: absolute;
  top: 14px; right: 14px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.72rem;
  color: rgba(255,255,255,0.7);
  z-index: 20;
  pointer-events: none;
}

/* Toast */
#toast {
  position: fixed;
  bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(25,25,25,0.95);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 22px;
  border-radius: 24px;
  font-size: 0.82rem;
  pointer-events: none;
  opacity: 0;
  z-index: 200;
  transition: opacity 0.3s, transform 0.3s;
  backdrop-filter: blur(8px);
  white-space: nowrap;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Keyboard shortcuts panel */
#shortcuts {
  position: absolute;
  bottom: 14px; left: 14px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  padding: 8px 12px;
  border-radius: var(--radius);
  font-size: 0.68rem;
  color: rgba(255,255,255,0.5);
  pointer-events: none;
  z-index: 20;
  line-height: 1.8;
}

/* ── RESPONSIVE ─────────────────────────────────────────────── */
@media (max-width: 768px) {
  #sidebar    { display: none !important; }
  #topbar     { display: flex; }
  #mobile-controls { display: flex; }
  #shortcuts  { display: none; }
  #main-video { height: 100%; object-fit: cover; width: 100%; }
}
@media (min-width: 769px) and (max-width: 1100px) {
}
@media (min-width: 769px) {
}
</style>
</head>
<body>

<!-- ── TOPBAR (mobile) ─────────────────────────────────────── -->
<div id="topbar">
  <span class="logo-text">XJJ</span>
  <div class="source-dropdown-wrap" id="mobile-dd-wrap">
    <div class="dd-selected" id="mobile-dd-selected" onclick="toggleDropdown('mobile')">
      <span id="mobile-dd-label">Source 1</span>
      <span class="dd-arrow">▼</span>
    </div>
    <div class="dd-menu" id="mobile-dd-menu"></div>
  </div>
</div>

<!-- ── APP ────────────────────────────────────────────────── -->
<div id="app">

  <!-- ── SIDEBAR (PC) ─────────────────────────────────────── -->
  <nav id="sidebar">
    <div class="sidebar-logo">XJJ</div>

    <div class="sidebar-section-label">Source</div>
    <div class="source-dropdown-wrap" id="sidebar-dd-wrap">
      <div class="dd-selected" id="sidebar-dd-selected" onclick="toggleDropdown('sidebar')">
        <span id="sidebar-dd-label">Source 1</span>
        <span class="dd-arrow">▼</span>
      </div>
      <div class="dd-menu" id="sidebar-dd-menu"></div>
    </div>

    <hr class="sidebar-divider">

    <div class="sidebar-section-label">Options</div>
    <div class="toggle-row">
      <span>Auto Next</span>
      <label class="toggle">
        <input type="checkbox" id="auto-next-toggle" onchange="toggleAutoNext()">
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span>Loop</span>
      <label class="toggle">
        <input type="checkbox" id="loop-toggle" onchange="toggleLoop()">
        <span class="toggle-slider"></span>
      </label>
    </div>

    <hr class="sidebar-divider">
    <div class="sidebar-section-label">Navigate</div>
    <div class="nav-btn-group">
      <button class="nav-arrow-btn" onclick="prevVideo()">⬆&nbsp; Previous</button>
      <button class="nav-arrow-btn pass-btn" onclick="nextVideo()">⬇&nbsp; PASS / Next</button>
    </div>
  </nav>

  <!-- ── VIDEO AREA ─────────────────────────────────────────── -->
  <div id="video-area">

    <div id="video-counter">–/–</div>

    <div id="video-container">
      <video id="main-video"
             playsinline
             webkit-playsinline
             preload="auto"
             onclick="togglePlay()">
      </video>
      <div id="play-flash"></div>
    </div>

    <!-- Loading / error overlay -->
    <div id="overlay">
      <div class="spinner"></div>
      <div id="overlay-msg">Loading videos…</div>
    </div>

    <!-- Keyboard shortcuts hint (PC) -->
    <div id="shortcuts">
      Space: Play/Pause &nbsp;·&nbsp; ↑/↓: Prev/Next<br>
      1/2: Switch Source &nbsp;·&nbsp; A: Auto &nbsp;·&nbsp; L: Loop<br>
      F: Fullscreen &nbsp;·&nbsp; Dbl-click: Fullscreen
    </div>

    <!-- Swipe hint (mobile) -->
    <div id="swipe-hint">↑ Swipe up for next &nbsp;·&nbsp; ↓ Swipe down for previous</div>

    <!-- Mobile bottom controls -->
    <div id="mobile-controls">
      <div class="mobile-btn-row">
        <button class="mobile-btn" id="auto-mobile" onclick="toggleAutoNext()">Auto: OFF</button>
        <button class="mobile-btn" id="loop-mobile" onclick="toggleLoop()">Loop: OFF</button>
      </div>
      <div class="mobile-btn-row">
        <button class="mobile-btn" onclick="prevVideo()">⬆ Prev</button>
        <button class="mobile-btn pass" onclick="nextVideo()">⬇ PASS</button>
      </div>
    </div>

  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<!-- ================================================================
     JAVASCRIPT
     ================================================================ -->
<script>
// ──────────────────────────────────────────────────────────────────
//  SOURCES
//
//  type: 'list' — loads a file once, iterates through URLs
//    format: 'txt'  → one URL per line
//    format: 'json' → ["url",...] or [["url",...]] or [{url,title},...]
//
//  type: 'api'  — each PASS hits the API for a fresh random video
//                 (the endpoint redirects straight to an .mp4)
// ──────────────────────────────────────────────────────────────────
const SOURCES = [
  { id: 1, label: 'Local TXT',      type: 'list', format: 'txt',  url: 'videos.txt'  },
  { id: 2, label: 'Local JSON',     type: 'list', format: 'json', url: 'videos.json' },
  { id: 3, label: 'CunShao PC',     type: 'api',                  url: 'https://www.cunshao.com/666666/api/pc.php'           },
  { id: 4, label: 'CunShao Web',    type: 'api',                  url: 'https://www.cunshao.com/666666/api/web.php'          },
  { id: 5, label: 'YuJN',           type: 'api',                  url: 'http://api.yujn.cn/api/zzxjj.php'                   },
  { id: 6, label: 'NRZJ Video',     type: 'api',                  url: 'http://v.nrzj.vip/video.php'                        },
  { id: 7, label: 'NRZJ TikTok',    type: 'api',                  url: 'http://v.nrzj.vip/tiktok/video.php'                 },
  { id: 8, label: 'NRZJ Video 2',   type: 'api',                  url: 'http://video.nrzj.vip/video.php'                    },
  { id: 9, label: 'NRZJ TikTok 2',  type: 'api',                  url: 'http://video.nrzj.vip/tiktok/video.php'             },
];

// ──────────────────────────────────────────────────────────────────
//  STATE
// ──────────────────────────────────────────────────────────────────
const state = {
  sourceId:     1,
  videos:       [],    // [{url, title}] — list sources only
  index:        0,     // list sources only
  autoNext:     false,
  loop:         false,
  badUrls:      new Set(),  // failed URLs never retried (list sources)
  skipCount:    0,
  skipTimer:    null,
  stalledTimer: null,
};

function activeSource() {
  return SOURCES.find(s => s.id === state.sourceId) || SOURCES[0];
}

// ──────────────────────────────────────────────────────────────────
//  DOM
// ──────────────────────────────────────────────────────────────────
const video      = document.getElementById('main-video');
const overlay    = document.getElementById('overlay');
const overlayMsg = document.getElementById('overlay-msg');
const playFlash  = document.getElementById('play-flash');
const swipeHint  = document.getElementById('swipe-hint');
const counter    = document.getElementById('video-counter');
const toast      = document.getElementById('toast');

// ──────────────────────────────────────────────────────────────────
//  LOAD SOURCE
// ──────────────────────────────────────────────────────────────────
async function loadSource(id) {
  const src = SOURCES.find(s => s.id === id);
  if (!src) return;

  state.sourceId  = id;
  state.badUrls   = new Set();
  state.skipCount = 0;
  clearTimeout(state.skipTimer);
  clearTimeout(state.stalledTimer);

  // Update dropdown labels + active state
  updateDropdownLabel(src);

  if (src.type === 'api') {
    // No list to fetch — play directly; each call returns a fresh video
    state.videos = [];
    state.index  = 0;
    hideOverlay();
    playCurrentVideo();
    showToast('✓ ' + src.label + ' (live API)');
    return;
  }

  // List source — fetch the file
  showOverlay('Loading ' + src.label + '…');
  try {
    const res = await fetch(src.url + '?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text().then(t => t.trim());
    let videos = [];

    if (src.format === 'txt') {
      videos = text.split('\n')
        .map(l => l.trim())
        .filter(l => l.length > 0 && !l.startsWith('#'))
        .map(url => ({ url, title: '' }));
    } else {
      // JSON: flat / nested [[...]] / [{url,title}]
      const raw = JSON.parse(text);
      if (!Array.isArray(raw)) throw new Error('JSON must be an array');
      const flat = (raw.length === 1 && Array.isArray(raw[0])) ? raw[0] : raw;
      videos = flat
        .map(item => {
          if (typeof item === 'string') return { url: item.trim(), title: '' };
          const url = (item.url || item.src || item.video || item.link || '').trim();
          return { url, title: item.title || item.name || '' };
        })
        .filter(v => v.url);
    }

    if (videos.length === 0) throw new Error('No video URLs found');
    state.videos = videos;
    state.index  = Math.floor(Math.random() * videos.length);
    hideOverlay();
    playCurrentVideo();
    showToast('✓ ' + src.label + ' — ' + videos.length + ' videos');
  } catch (err) {
    showOverlay('⚠  ' + err.message);
    console.error('[XJJ] Source load error:', err);
    showToast('Error loading ' + src.label);
  }
}

// ──────────────────────────────────────────────────────────────────
//  PLAYBACK
// ──────────────────────────────────────────────────────────────────
function playCurrentVideo() {
  const src = activeSource();
  state.skipCount = 0;
  clearTimeout(state.skipTimer);
  clearTimeout(state.stalledTimer);

  if (src.type === 'api') {
    // Append timestamp so every call fetches a fresh random video
    const apiUrl = src.url + (src.url.includes('?') ? '&' : '?') + '_=' + Date.now();
    counter.textContent = src.label + ' — live';
    showOverlay('Loading…');
    video.src  = apiUrl;
    video.loop = state.loop;
    video.load();

    // Watchdog: if nothing plays within 10 s, show timeout message
    state.stalledTimer = setTimeout(() => {
      if (overlay.classList.contains('hidden')) return;
      console.warn('[XJJ] API timeout:', src.url);
      showOverlay('⚠ API timed out — press PASS to try again');
      showToast('API timed out');
    }, 10000);

    video.play().catch(() => {
      clearTimeout(state.stalledTimer);
      hideOverlay();
      showOverlay('▶ Tap / click to play');
    });
    return;
  }

  // List source
  if (!state.videos.length) return;

  // Skip known-bad URLs, up to full-circle
  const startIndex = state.index;
  while (state.badUrls.has(state.videos[state.index].url)) {
    state.index = (state.index + 1) % state.videos.length;
    if (state.index === startIndex) {
      showOverlay('⚠ All videos in this source failed to load');
      showToast('No working videos in ' + src.label);
      return;
    }
  }

  const item  = state.videos[state.index];
  const label = (state.index + 1) + ' / ' + state.videos.length +
                (state.badUrls.size ? '  (' + state.badUrls.size + ' skipped)' : '');
  counter.textContent = label;
  showOverlay('Loading…');
  video.src  = item.url;
  video.loop = state.loop;
  video.load();

  // Watchdog: if canplay never fires within 8 s, mark as broken
  state.stalledTimer = setTimeout(() => {
    if (overlay.classList.contains('hidden')) return;
    console.warn('[XJJ] Load timeout:', item.url);
    markBadAndSkip('Timed out');
  }, 8000);

  video.play().catch(() => {
    clearTimeout(state.stalledTimer);
    hideOverlay();
    showOverlay('▶ Tap / click to play');
  });
}

// Mark current URL bad and auto-advance to next
function markBadAndSkip(reason) {
  const src = activeSource();
  clearTimeout(state.stalledTimer);

  if (src.type === 'api') {
    // API errors: just retry with a fresh call
    state.skipCount++;
    showOverlay('⚠ ' + reason + ' — retrying…');
    showToast('Retrying ' + src.label);
    state.skipTimer = setTimeout(playCurrentVideo, 1000);
    return;
  }

  const url = state.videos[state.index]?.url;
  if (!url) return;

  state.badUrls.add(url);
  state.skipCount++;

  const remaining = state.videos.length - state.badUrls.size;
  console.warn('[XJJ] Bad video (' + reason + '):', url,
               '| bad:', state.badUrls.size, '| remaining:', remaining);

  if (remaining <= 0) {
    showOverlay('⚠ All videos in this source failed to load');
    showToast('No working videos in ' + src.label);
    return;
  }

  showOverlay('⚠ ' + reason + ' — skipping… (' + state.badUrls.size + ' failed)');
  showToast('Skipped broken video (' + remaining + ' remaining)');

  state.skipTimer = setTimeout(() => {
    state.index = (state.index + 1) % state.videos.length;
    playCurrentVideo();
  }, 800);
}

function nextVideo() {
  const src = activeSource();
  if (src.type === 'api') { playCurrentVideo(); return; } // fresh API call = new random video
  if (!state.videos.length) return;
  state.index = (state.index + 1) % state.videos.length;
  playCurrentVideo();
}

function prevVideo() {
  const src = activeSource();
  if (src.type === 'api') { playCurrentVideo(); return; } // no concept of "previous" for live API
  if (!state.videos.length) return;
  state.index = (state.index - 1 + state.videos.length) % state.videos.length;
  playCurrentVideo();
}

function togglePlay() {
  if (!video.src) return;
  if (video.paused) { video.play();  flashIcon('▶'); }
  else              { video.pause(); flashIcon('⏸'); }
}

function flashIcon(icon) {
  playFlash.textContent = icon;
  playFlash.style.cssText = `
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%) scale(1);
    font-size:3.5rem; opacity:1;
    pointer-events:none; z-index:10;
    text-shadow:0 0 20px rgba(0,0,0,0.6);
    transition:none;
  `;
  clearTimeout(playFlash._t);
  playFlash._t = setTimeout(() => {
    playFlash.style.transition = 'opacity 0.4s, transform 0.4s';
    playFlash.style.opacity    = '0';
    playFlash.style.transform  = 'translate(-50%,-50%) scale(1.4)';
  }, 120);
}

// ──────────────────────────────────────────────────────────────────
//  VIDEO EVENTS
// ──────────────────────────────────────────────────────────────────
video.addEventListener('canplay', () => {
  clearTimeout(state.stalledTimer);
  hideOverlay();
});
video.addEventListener('playing', () => {
  clearTimeout(state.stalledTimer);
  hideOverlay();
});
video.addEventListener('waiting', () => {
  clearTimeout(state.stalledTimer);
  state.stalledTimer = setTimeout(() => {
    if (!overlay.classList.contains('hidden')) return;
    markBadAndSkip('Stalled / no data');
  }, 10000);
  showOverlay('Buffering…');
});
video.addEventListener('stalled', () => {
  clearTimeout(state.stalledTimer);
  state.stalledTimer = setTimeout(() => {
    markBadAndSkip('Stalled');
  }, 6000);
  showOverlay('Stalled…');
});
video.addEventListener('abort', () => {
  if (video.src && video.readyState === 0) markBadAndSkip('Aborted');
});
video.addEventListener('error', () => {
  const code  = video.error ? video.error.code : '?';
  const msgs  = { 1:'Aborted', 2:'Network error', 3:'Decode error', 4:'Not supported' };
  markBadAndSkip(msgs[code] || ('Error ' + code));
});
video.addEventListener('ended', () => {
  if (state.autoNext && !state.loop) nextVideo();
});
video.addEventListener('dblclick', toggleFullscreen);

// ──────────────────────────────────────────────────────────────────
//  SOURCE SWITCHING
// ──────────────────────────────────────────────────────────────────
function switchSource(id) {
  closeAllDropdowns();
  loadSource(id);
}

// ──────────────────────────────────────────────────────────────────
//  TOGGLES
// ──────────────────────────────────────────────────────────────────
function toggleAutoNext() {
  state.autoNext = !state.autoNext;
  document.getElementById('auto-next-toggle').checked = state.autoNext;
  const btn = document.getElementById('auto-mobile');
  btn.textContent = 'Auto: ' + (state.autoNext ? 'ON' : 'OFF');
  btn.classList.toggle('btn-active', state.autoNext);
  showToast('Auto Next ' + (state.autoNext ? 'ON' : 'OFF'));
}

function toggleLoop() {
  state.loop  = !state.loop;
  video.loop  = state.loop;
  document.getElementById('loop-toggle').checked = state.loop;
  const btn = document.getElementById('loop-mobile');
  btn.textContent = 'Loop: ' + (state.loop ? 'ON' : 'OFF');
  btn.classList.toggle('btn-active', state.loop);
  showToast('Loop ' + (state.loop ? 'ON' : 'OFF'));
}

// ──────────────────────────────────────────────────────────────────
//  FULLSCREEN
// ──────────────────────────────────────────────────────────────────
function toggleFullscreen() {
  if (document.fullscreenElement || document.webkitFullscreenElement) {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  } else {
    const el = video;
    (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen)?.call(el);
  }
}

// ──────────────────────────────────────────────────────────────────
//  KEYBOARD
// ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  switch (e.key) {
    case 'ArrowDown': case 'ArrowRight': case 'n': case 'N':
      e.preventDefault(); nextVideo(); break;
    case 'ArrowUp': case 'ArrowLeft': case 'p': case 'P':
      e.preventDefault(); prevVideo(); break;
    case ' ':
      e.preventDefault(); togglePlay(); break;
    case 'a': case 'A': toggleAutoNext(); break;
    case 'l': case 'L': toggleLoop(); break;
    case 'f': case 'F': toggleFullscreen(); break;
  }
});

// ──────────────────────────────────────────────────────────────────
//  TOUCH / SWIPE (Mobile)
// ──────────────────────────────────────────────────────────────────
let touchStartY = 0, touchStartX = 0;
const SWIPE_MIN = 50;

document.addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
  touchStartX = e.touches[0].clientX;
}, { passive: true });

document.addEventListener('touchend', e => {
  const dy = touchStartY - e.changedTouches[0].clientY;
  const dx = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(dy) > SWIPE_MIN && Math.abs(dy) > Math.abs(dx) * 1.2) {
    dy > 0 ? nextVideo() : prevVideo();
  }
}, { passive: true });

// ──────────────────────────────────────────────────────────────────
//  OVERLAY HELPERS
// ──────────────────────────────────────────────────────────────────
function showOverlay(msg) {
  overlay.classList.remove('hidden');
  overlayMsg.textContent = msg || '';
}
function hideOverlay() {
  overlay.classList.add('hidden');
}

// ──────────────────────────────────────────────────────────────────
//  TOAST
// ──────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
}

// ──────────────────────────────────────────────────────────────────
//  HIDE SWIPE HINT AFTER 5s
// ──────────────────────────────────────────────────────────────────
setTimeout(() => swipeHint.classList.add('hidden'), 5000);
document.addEventListener('touchend', () => swipeHint.classList.add('hidden'), { once: true });

// ──────────────────────────────────────────────────────────────────
//  BUILD SOURCE BUTTONS DYNAMICALLY
// ──────────────────────────────────────────────────────────────────
// ──────────────────────────────────────────────────────────────────
//  DROPDOWN HELPERS
// ──────────────────────────────────────────────────────────────────
function toggleDropdown(which) {
  const menu     = document.getElementById(which + '-dd-menu');
  const selected = document.getElementById(which + '-dd-selected');
  const isOpen   = menu.classList.contains('open');
  closeAllDropdowns();
  if (!isOpen) {
    menu.classList.add('open');
    selected.classList.add('open');
  }
}

function closeAllDropdowns() {
  ['sidebar', 'mobile'].forEach(which => {
    document.getElementById(which + '-dd-menu')?.classList.remove('open');
    document.getElementById(which + '-dd-selected')?.classList.remove('open');
  });
}

function updateDropdownLabel(src) {
  document.getElementById('sidebar-dd-label').textContent = src.label;
  document.getElementById('mobile-dd-label').textContent  = src.label;
  // Update active state in both menus
  document.querySelectorAll('.dd-menu button').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.id) === src.id);
  });
}

// Close dropdowns when clicking outside
document.addEventListener('click', e => {
  if (!e.target.closest('.source-dropdown-wrap')) closeAllDropdowns();
});

function buildSourceButtons() {
  ['sidebar', 'mobile'].forEach(which => {
    const menu = document.getElementById(which + '-dd-menu');
    menu.innerHTML = '';
    SOURCES.forEach((src, i) => {
      const btn = document.createElement('button');
      btn.dataset.id = src.id;
      btn.className  = i === 0 ? 'active' : '';
      const icon  = src.type === 'api' ? '🌐' : '📋';
      const badge = '<span class="dd-badge badge-' + src.type + '">' +
                    (src.type === 'api' ? 'LIVE' : 'FILE') + '</span>';
      btn.innerHTML = '<span>' + icon + ' ' + src.label + '</span>' + badge;
      btn.onclick   = () => switchSource(src.id);
      menu.appendChild(btn);
    });
  });
}

// ──────────────────────────────────────────────────────────────────
//  INIT
// ──────────────────────────────────────────────────────────────────
buildSourceButtons();
loadSource(SOURCES[0].id);
</script>
</body>
</html>
